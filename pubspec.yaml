name: peerchat_secure
description: A privacy-first P2P chat (MVP Flutter scaffold)
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  qr_flutter: ^4.1.0
  flutter_secure_storage: ^10.0.0
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.0
  sodium: ^4.0.1
  provider: ^6.1.2
  multicast_dns: ^0.3.2+8
  uuid: ^4.5.3
  flutter_blue_classic: ^0.1.0
  nearby_connections: ^4.3.0
  permission_handler: ^12.0.1
  google_sign_in: ^7.2.0
  google_fonts: ^8.0.2
  crypto: ^3.0.6
  flutter_ringtone_player: ^4.0.0+4
  flutter_local_notifications: ^21.0.0
 
  mobile_scanner: ^7.2.0
  nsd: ^5.0.1
  file_picker: ^11.0.2
  mime: ^2.0.0
  open_filex: ^4.7.0
  external_path: ^2.2.0
  app_links: ^6.3.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/image.png"
  min_sdk_android: 24

flutter:
  uses-material-design: true
  assets:
    - assets/image.png
    - assets/sounds/send_tick.wav
    - assets/sounds/broadcast_alert.wav
