name: peerchat_secure
description: A privacy-first P2P chat (MVP Flutter scaffold)
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  qr_flutter: ^4.1.0
  flutter_secure_storage: ^10.0.0
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.0
  sodium: ^3.5.0
  sodium_libs: ^3.5.0
  provider: ^6.1.2
  multicast_dns: ^0.3.2+8
  uuid: ^4.5.3
  flutter_blue_classic: ^0.0.9
  nearby_connections: ^4.3.0
  permission_handler: ^12.0.1
  google_sign_in: ^6.2.2
  google_fonts: ^8.0.2
  crypto: ^3.0.6
  flutter_ringtone_player: ^4.0.0+4
  flutter_local_notifications: ^19.4.2

  mobile_scanner: ^7.2.0
  nsd: ^4.1.0
  file_picker: ^8.1.5
  mime: ^2.0.0
  open_file_plus: ^4.1.3
  external_path: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/image.png"
  min_sdk_android: 24

flutter:
  uses-material-design: true
  assets:
    - assets/image.png
    - assets/sounds/send_tick.wav
    - assets/sounds/broadcast_alert.wav
