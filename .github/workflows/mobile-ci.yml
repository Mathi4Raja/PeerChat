# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Mobile Release

on:
  push:
    tags:
      - 'v*' # Triggers on v1.0.0, v1.1.0, etc.

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential for generating accurate release notes

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=key" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      - name: Build release APK
        run: flutter build apk --release --target-platform android-arm,android-arm64

      - name: Publish to GitHub Releases
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          # Get the tag name (e.g. v1.1.0)
          VERSION=${GITHUB_REF#refs/tags/}
          
          # Rename the artifact to PeerChat-<version>.apk
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/PeerChat-$VERSION.apk

          # Create the release with auto-generated notes from commit history
          gh release create $VERSION \
            --repo $GITHUB_REPOSITORY \
            --title "PeerChat $VERSION" \
            --generate-notes \
            build/app/outputs/flutter-apk/PeerChat-$VERSION.apk
